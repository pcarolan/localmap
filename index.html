<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalMap — Petoskey, MI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header id="header">
        <button id="sidebar-toggle" aria-label="Toggle sidebar">&#9776;</button>
        <h1>Petoskey, MI</h1>
    </header>

    <aside id="sidebar">
        <div id="filters">
            <button class="filter-btn active" data-filter="all">Feed</button>
            <button class="filter-btn" data-filter="event">Events</button>
            <button class="filter-btn" data-filter="news">News</button>
            <button class="filter-btn" data-filter="qa">Q&amp;A</button>
        </div>
        <div id="feed"></div>
    </aside>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
